<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Developer Relations in the AI Era</title>
    <meta name="description" content="An essay on how Developer Relations changes as AI coding reshapes who builds software and how adoption happens.">
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f3ea;
        --paper: #fffdf8;
        --ink: #1e2528;
        --muted: #5f6d70;
        --line: #d8d0c2;
        --accent: #0f766e;
        --accent-dark: #134e4a;
        --table: #eef6f4;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: linear-gradient(180deg, rgba(15, 118, 110, 0.08), transparent 18rem), var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.68;
      }

      main {
        width: min(100% - 32px, 980px);
        margin: 0 auto;
        padding: 56px 0 72px;
      }

      article {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 20px 60px rgba(30, 37, 40, 0.08);
        padding: clamp(28px, 5vw, 64px);
      }

      .source-link {
        display: inline-flex;
        margin-bottom: 24px;
        color: var(--accent-dark);
        font-size: 0.92rem;
        font-weight: 650;
        text-decoration: none;
      }

      .source-link:hover, a:hover { color: var(--accent); }
      h1, h2, h3 { line-height: 1.18; }

      h1 {
        max-width: 760px;
        margin: 0 0 12px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.4rem, 8vw, 5.8rem);
        font-weight: 700;
      }

      h2 {
        margin-top: 52px;
        border-top: 1px solid var(--line);
        padding-top: 28px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(1.55rem, 3vw, 2.25rem);
      }

      h3 {
        margin-top: 32px;
        color: var(--accent-dark);
        font-size: 1.12rem;
      }

      p, li { font-size: 1.04rem; }
      p { margin: 1.05em 0; }
      a { color: var(--accent-dark); text-underline-offset: 0.18em; }
      ul, ol { padding-left: 1.45rem; }

      table {
        display: block;
        width: 100%;
        margin: 28px 0;
        overflow-x: auto;
        border-collapse: collapse;
        font-size: 0.95rem;
      }

      th, td {
        min-width: 160px;
        border: 1px solid var(--line);
        padding: 12px 14px;
        vertical-align: top;
      }

      th { background: var(--table); color: var(--accent-dark); text-align: left; }
      code { border-radius: 4px; background: #eef1ed; padding: 0.1rem 0.28rem; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.92em; }
      .loading, .error { color: var(--muted); font-size: 1.05rem; }

      @media (max-width: 640px) {
        main { width: min(100% - 20px, 980px); padding: 20px 0 44px; }
        article { padding: 24px 18px; }
        h2 { margin-top: 40px; }
      }
    </style>
  </head>
  <body>
    <main>
      <article>
        <a class="source-link" href="developer-relations-ai-coding-era.md">View source Markdown</a>
        <div id="content" class="loading">Loading article...</div>
      </article>
    </main>
    <script>
      const content = document.querySelector('#content');
      const escapeHtml = (value) => value
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');

      const inline = (value) => escapeHtml(value)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

      const cells = (line) => line.trim().replace(/^\||\|$/g, '').split('|').map((cell) => cell.trim());

      function renderTable(lines) {
        const header = cells(lines[0]);
        const rows = lines.slice(2).map(cells);
        return `<table><thead><tr>${header.map((cell) => `<th>${inline(cell)}</th>`).join('')}</tr></thead><tbody>${rows.map((row) => `<tr>${row.map((cell) => `<td>${inline(cell)}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
      }

      function render(markdown) {
        const lines = markdown.split('\n');
        const html = [];
        let paragraph = [];
        let list = [];

        const flushParagraph = () => {
          if (paragraph.length) {
            html.push(`<p>${inline(paragraph.join(' '))}</p>`);
            paragraph = [];
          }
        };

        const flushList = () => {
          if (list.length) {
            html.push(`<ul>${list.map((item) => `<li>${inline(item)}</li>`).join('')}</ul>`);
            list = [];
          }
        };

        for (let index = 0; index < lines.length; index += 1) {
          const line = lines[index];
          const trimmed = line.trim();

          if (!trimmed) {
            flushParagraph();
            flushList();
            continue;
          }

          if (trimmed.startsWith('|') && lines[index + 1]?.trim().match(/^\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?$/)) {
            flushParagraph();
            flushList();
            const tableLines = [];
            while (lines[index]?.trim().startsWith('|')) {
              tableLines.push(lines[index]);
              index += 1;
            }
            index -= 1;
            html.push(renderTable(tableLines));
            continue;
          }

          if (trimmed.startsWith('#')) {
            flushParagraph();
            flushList();
            const level = trimmed.match(/^#+/)[0].length;
            html.push(`<h${level}>${inline(trimmed.slice(level).trim())}</h${level}>`);
            continue;
          }

          if (trimmed.startsWith('- ')) {
            flushParagraph();
            list.push(trimmed.slice(2));
            continue;
          }

          flushList();
          paragraph.push(trimmed);
        }

        flushParagraph();
        flushList();
        return html.join('\n');
      }

      fetch('developer-relations-ai-coding-era.md')
        .then((response) => {
          if (!response.ok) throw new Error('Article failed to load');
          return response.text();
        })
        .then((markdown) => {
          content.className = '';
          content.innerHTML = render(markdown);
        })
        .catch(() => {
          content.className = 'error';
          content.textContent = 'The article could not be loaded.';
        });
    </script>
  </body>
</html>

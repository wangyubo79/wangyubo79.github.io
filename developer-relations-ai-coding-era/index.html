    <script>
      const content = document.querySelector('#content');
      const escapeHtml = (value) => value
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');

      const inline = (value) => escapeHtml(value)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

      const cells = (line) => line.trim().replace(/^\||\|$/g, '').split('|').map((cell) => cell.trim());

      function renderTable(lines) {
        const header = cells(lines[0]);
        const rows = lines.slice(2).map(cells);
        return `<table><thead><tr>${header.map((cell) => `<th>${inline(cell)}</th>`).join('')}</tr></thead><tbody>${rows.map((row) => `<tr>${row.map((cell) => `<td>${inline(cell)}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
      }

      function render(markdown) {
        const lines = markdown.split('\n');
        const html = [];
        let paragraph = [];
        let list = [];

        const flushParagraph = () => {
          if (paragraph.length) {
            html.push(`<p>${inline(paragraph.join(' '))}</p>`);
            paragraph = [];
          }
        };

        const flushList = () => {
          if (list.length) {
            html.push(`<ul>${list.map((item) => `<li>${inline(item)}</li>`).join('')}</ul>`);
            list = [];
          }
        };

        for (let index = 0; index < lines.length; index += 1) {
          const line = lines[index];
          const trimmed = line.trim();

          if (!trimmed) {
            flushParagraph();
            flushList();
            continue;
          }

          if (trimmed.startsWith('|') && lines[index + 1]?.trim().match(/^\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?$/)) {
            flushParagraph();
            flushList();
            const tableLines = [];
            while (lines[index]?.trim().startsWith('|')) {
              tableLines.push(lines[index]);
              index += 1;
            }
            index -= 1;
            html.push(renderTable(tableLines));
            continue;
          }

          if (trimmed.startsWith('#')) {
            flushParagraph();
            flushList();
            const level = Math.min(trimmed.match(/^#+/)[0].length, 3);
            html.push(`<h${level}>${inline(trimmed.slice(level).trim())}</h${level}>`);
            continue;
          }

          if (trimmed.startsWith('- ')) {
            flushParagraph();
            list.push(trimmed.slice(2));
            continue;
          }

          flushList();
          paragraph.push(trimmed);
        }

        flushParagraph();
        flushList();
        return html.join('\n');
      }

      fetch('../developer-relations-ai-coding-era.md')
        .then((response) => {
          if (!response.ok) throw new Error('Article failed to load');
          return response.text();
        })
        .then((markdown) => {
          content.className = '';
          content.removeAttribute('aria-live');
          content.innerHTML = render(markdown);
        })
        .catch(() => {
          content.className = 'error';
          content.textContent = 'The article could not be loaded.';
        });
    </script>
